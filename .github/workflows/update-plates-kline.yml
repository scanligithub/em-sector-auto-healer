name: 更新板块列表和日K线数据

on:
  workflow_dispatch:           # 手动触发
  schedule:
    - cron: '0 3 * * 1'        # 每周一 北京时间上午11点运行

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 480       # 最长运行8小时
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install requests pandas tqdm
      
      - name: 运行板块列表 + K线下载
        run: python update_plates_and_kline.py
      
      - name: 上传结果（供下载）
        uses: actions/upload-artifact@v4
        with:
          name: plates-and-kline-data
          path: |
            全板块列表_最新.csv
            板块日K线数据/
          retention-days: 7
