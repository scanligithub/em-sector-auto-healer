name: 测试抓取概念板块列表

on:
  workflow_dispatch:        # 手动触发（推荐先用这个测试）
  schedule:
    - cron: '0 3 * * *'     # 北京时间每天上午11点（可选）

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl
      
      - name: 运行抓取脚本
        run: python get_concept_plates.py
      
      - name: 显示生成的文件列表
        run: ls -lh *.csv *.xlsx
      
      - name: 上传抓取结果（方便下载查看）
        uses: actions/upload-artifact@v4
        with:
          name: concept-plates
          path: |
            概念板块列表_*.csv
            概念板块列表_*.xlsx
            概念板块列表_最新.*
          retention-days: 7
