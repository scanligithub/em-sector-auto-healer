name: 测试抓取全板块列表

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install requests pandas openpyxl
      
      - name: 运行抓取
        run: python get_concept_plates.py
      
      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: all-plates-result
          path: |
            全板块列表_*.csv
            全板块列表_*.xlsx
            全板块列表_最新.*
          retention-days: 7
