name: Sector Fetcher Nitro

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cloud-api-bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run Cloud Benchmark
        env:
          DATA_LIMIT: 100
          MAX_SECTORS: 100
        run: |
          python main.py

      # 将 Actions 抓取到的 100 个板块数据打包上传，便于人工在线校验和数据留存
      - name: Upload Intercepted Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloud-sector-jsons
          path: data/*_direct.json
