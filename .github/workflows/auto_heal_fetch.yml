name: Sector Fetcher Nitro

on:
  workflow_dispatch:
    inputs:
      attempt:
        description: 'Current Execution Attempt (Internal use)'
        required: false
        default: '1'
      chain_run_ids:
        description: 'Comma separated historical run IDs (Internal use)'
        required: false
        default: ''
  # 可以随时打开定时触发，每天收盘后自动更新：
  # schedule:
  #   - cron: '10 5 * * 1-5' # 每周1-5北京时间下午1:10点运行

permissions:
  contents: write
  actions: write

jobs:
  dispatcher:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - run: pip install -r requirements.txt

      - name: Fetch Stock Seeds via TDX (Attempt 1 Only)
        if: ${{ github.event.inputs.attempt == '1' || github.event.inputs.attempt == '' }}
        run: |
          go mod init tdx_seed || true
          go get github.com/injoyai/tdx@master
          go mod tidy
          go run tools/fetch_seeds.go
      
      - name: Download Pending List
        if: ${{ github.event.inputs.attempt != '1' && github.event.inputs.attempt != '' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: auto_heal_fetch.yml
          name: pending-list-artifact
          path: .
          
      - name: Generate Matrix & Extract Metadata
        id: set-matrix
        env:
          ATTEMPT_COUNT: ${{ github.event.inputs.attempt || '1' }}
        run: |
          python scripts/dispatcher.py
          echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT
          
      - name: Upload Metadata
        if: ${{ github.event.inputs.attempt == '1' || github.event.inputs.attempt == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: metadata-artifact
          path: metadata/*.json
          retention-days: 1
          
      - name: Upload Chunks
        uses: actions/upload-artifact@v4
        with:
          name: chunks-artifact
          path: chunks/*.json
          retention-days: 1

  fetch-cluster:
    needs: dispatcher
    runs-on: ubuntu-latest
    if: needs.dispatcher.outputs.matrix != '[]'
    container:
      image: mcr.microsoft.com/playwright/python:v1.42.0-jammy
    strategy:
      matrix:
        chunk_id: ${{ fromJson(needs.dispatcher.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          
      - name: Download Chunks
        uses: actions/download-artifact@v4
        with:
          name: chunks-artifact
          path: chunks/
          
      - name: Execute Node Engine
        run: python core/muscle_engine.py ${{ matrix.chunk_id }}
        
      - name: Upload Success Data
        uses: actions/upload-artifact@v4
        with:
          name: success-data-${{ github.run_id }}-chunk-${{ matrix.chunk_id }}
          path: success_data_${{ matrix.chunk_id }}/*.json
          retention-days: 1
          
      - name: Upload Failed List
        uses: actions/upload-artifact@v4
        with:
          name: failed-list-chunk-${{ matrix.chunk_id }}
          path: failed_list_${{ matrix.chunk_id }}.json
          retention-days: 1

  aggregator:
    needs: [dispatcher, fetch-cluster]
    if: always() && needs.dispatcher.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.judge.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Download Failed Lists
        uses: actions/download-artifact@v4
        with:
          pattern: failed-list-chunk-*
          merge-multiple: true
          path: .
          
      - name: Download Current Success Data
        uses: actions/download-artifact@v4
        with:
          pattern: success-data-${{ github.run_id }}-chunk-*
          merge-multiple: true
          path: success_data_merged/
          
      - name: Aggregate & Judge
        id: judge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_ATTEMPT: ${{ github.event.inputs.attempt || '1' }}
          CHAIN_IDS: ${{ github.event.inputs.chain_run_ids || '' }}
        run: |
          python scripts/aggregator.py > result.txt
          REMAINING=$(grep "COUNT=" result.txt | cut -d'=' -f2)
          echo "判定结束：当前依然残留未完成板块数: $REMAINING"
          
          NEW_CHAIN="${CHAIN_IDS},${{ github.run_id }}"
          NEW_CHAIN=$(echo $NEW_CHAIN | sed 's/^,//')
          
          if [ "$REMAINING" -gt "0" ] && [ "$CURRENT_ATTEMPT" -lt "15" ]; then
            echo "💥 存在未下载完的数据，触发接力!"
            echo "status=CONTINUE" >> $GITHUB_OUTPUT
            gh workflow run auto_heal_fetch.yml \
              -f attempt=$((CURRENT_ATTEMPT+1)) \
              -f chain_run_ids="$NEW_CHAIN"
          else
            echo "✅ 队列抽干，下发 Release 指令！"
            echo "status=DONE" >> $GITHUB_OUTPUT
            echo "$NEW_CHAIN" > final_chain.txt
          fi
          
      - name: Upload Pending List
        uses: actions/upload-artifact@v4
        with:
          name: pending-list-artifact
          path: pending_list.json
          retention-days: 1
          
      - name: Upload Final Chain
        if: steps.judge.outputs.status == 'DONE'
        uses: actions/upload-artifact@v4
        with:
          name: final-chain-artifact
          path: final_chain.txt

  releaser:
    needs: aggregator
    if: needs.aggregator.outputs.status == 'DONE'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Download Final Chain
        uses: actions/download-artifact@v4
        with:
          name: final-chain-artifact
          
      - name: Consolidated All Runs Data & Metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir final_dataset
          CHAIN_IDS=$(cat final_chain.txt)
          IFS=',' read -ra ADDR <<< "$CHAIN_IDS"
          
          for id in "${ADDR[@]}"; do
            echo "⬇️ 回收 Run ID: $id K线碎片..."
            gh run download $id --pattern "success-data-$id-chunk-*" --dir final_dataset --repo ${{ github.repository }} || true
          done
          
          find final_dataset -type f -name "*.json" -exec mv {} final_dataset/ \;
          find final_dataset -type d -empty -delete
          
          FIRST_RUN_ID="${ADDR[0]}"
          echo "⬇️ 从首轮回收元数据大名单..."
          mkdir -p final_dataset/metadata
          gh run download $FIRST_RUN_ID -n metadata-artifact --dir final_dataset/metadata --repo ${{ github.repository }} || true

      - name: QA Inspector (深度数据质检)
        run: python scripts/qa_inspector.py

      - name: Compare Size and Create/Overwrite Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 打包新生成的全量数据集
          cd final_dataset
          zip -r ../Full_Sector_Klines.zip .
          cd ..
          
          NEW_ZIP="Full_Sector_Klines.zip"
          OLD_ZIP="Old_Full_Sector_Klines.zip"
          TARGET_TAG="latest"
          SHOULD_RELEASE=true
          
          # 2. 动态探测仓库中当前标有 "Latest" 状态的真实 Release Tag 名
          echo "🔍 正在动态探测现存的最新的 Release..."
          EXISTING_TAG=$(gh release view --repo "${{ github.repository }}" --json tagName --jq '.tagName' 2>/dev/null || echo "")
          
          if [ -n "${EXISTING_TAG}" ]; then
            echo "ℹ️ 发现现存最新的 Release，其物理 Tag 为: [${EXISTING_TAG}]"
            echo "📥 正在尝试下载该 Release 中的旧版 ZIP 资产..."
            
            if gh release download "${EXISTING_TAG}" --pattern "${NEW_ZIP}" --output "${OLD_ZIP}" --repo "${{ github.repository }}" --clobber; then
              if [ -f "${OLD_ZIP}" ]; then
                NEW_SIZE=$(stat -c%s "${NEW_ZIP}")
                OLD_SIZE=$(stat -c%s "${OLD_ZIP}")
                echo "📊 新 ZIP 物理大小: ${NEW_SIZE} 字节"
                echo "📊 旧 ZIP 物理大小: ${OLD_SIZE} 字节"
                
                if [ "$NEW_SIZE" -lt "$OLD_SIZE" ]; then
                  echo "⚠️ 警告：当前新生成文件大小 (${NEW_SIZE} 字节) 小于已有老版本 (${OLD_SIZE} 字节)！"
                  echo "🚫 放弃本次更新，保持 Release 中的老版本文件。"
                  SHOULD_RELEASE=false
                else
                  echo "✅ 校验通过：新文件大小符合更新标准。"
                fi
              fi
            else
              echo "⚠️ 无法下载旧版资产或该 Release 中尚未包含文件，将直接执行全新覆盖。"
            fi
          else
            echo "ℹ️ 未检测到任何既有 Release，将执行首次创建。"
          fi
          
          # 3. 执行 Release 写入与物理覆盖
          if [ "$SHOULD_RELEASE" = true ]; then
            DATE_TAG=$(date +'%Y-%m-%d %H:%M:%S')
            
            if [ -n "${EXISTING_TAG}" ]; then
              echo "🧹 清理旧的 Release [${EXISTING_TAG}]..."
              gh release delete "${EXISTING_TAG}" --yes --repo "${{ github.repository }}" 2>/dev/null || true
              
              if [ "${EXISTING_TAG}" != "${TARGET_TAG}" ]; then
                git push origin :refs/tags/${EXISTING_TAG} 2>/dev/null || true
              fi
            fi
            
            echo "🚀 正在创建唯一的标准 Release [${TARGET_TAG}]..."
            gh release create "${TARGET_TAG}" "${NEW_ZIP}" \
              --title "Sector Klines & Metadata (Latest)" \
              --notes "自愈接力系统全量归档。更新时间: ${DATE_TAG} (UTC)。请在 Actions 页面查看本次提取的数据质量质检报告 (QA Summary)。"
              
            echo "🎉 Release [${TARGET_TAG}] 更新覆盖完毕，目前 Releases 列表中仅保留此最新版本。"
          else
            echo "⏭️ 已跳过 Release 资产覆盖步骤，维持原有历史数据。"
          fi
