name: Sector Fetcher Nitro

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cloud-api-bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run Cloud Benchmark
        run: |
          python main.py

      # 打包上传抓取成功的板块数据包（哪怕触发了熔断，此前抓到的一部分数据也会被保存）
      - name: Upload Intercepted Artifacts
        uses: actions/upload-artifact@v4
        if: always() # 确保即使脚本熔断失败，成功下载的 JSON 也会被归档
        with:
          name: cloud-sector-full-history-jsons
          path: data/*_direct.json
