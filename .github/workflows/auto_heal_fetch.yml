name: AI Auto-Healing Sector Fetcher

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          # 💡 Scrapling 依赖 playwright，但需要通过 python -m playwright 方式调用安装
          python -m playwright install chromium --with-deps

      - name: Run Engine
        env:
          CONCURRENCY: 15
          # 💡 确保你在 GitHub Secrets 中配置了 CF_WORKER_URLS (多个用逗号隔开)
          CF_WORKER_URLS: ${{ secrets.CF_WORKER_URLS }}
          DATA_PATH: "data/sector_klines_full.parquet"
        run: python main.py

      - name: Auto-Commit If Data Updated
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 如果有数据更新则提交（可选，如果数据太大建议只传 Artifact）
          git add data/*.parquet || true
          git commit -m "🤖 Data Update: Sector Klines Incremental" || true
          git push || true

      - name: Upload Data Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sector-data
          path: data/*.parquet
