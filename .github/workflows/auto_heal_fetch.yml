name: Sector Fetcher Nitro

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Restore Data Warehouse Cache
        uses: actions/cache@v4
        with:
          path: data/sector_quant.db
          key: sector-db-${{ github.run_id }}
          restore-keys: sector-db-

      - name: Run Engine
        env:
          CONCURRENCY: 30
          CF_WORKER_URLS: ${{ secrets.CF_WORKER_URLS }}
          DATA_PATH: "data/sector_klines_full.parquet"
        run: python main.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sector-data-package
          path: |
            data/sector_quant.db
            data/sector_klines_full.parquet
