name: Sector Fetcher Nitro

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cloud-api-bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run Cloud Benchmark
        env:
          DATA_LIMIT: 1000000  # 【修改点】 1000000 代表获取全部历史数据
          MAX_SECTORS: 100     # 云端批量同步板块上限
          CF_WORKER_URL: # ${{ secrets.CF_WORKER_URL }}
        run: |
          python main.py

      # 打包上传抓取到的全量历史 JSON 数据压缩包
      - name: Upload Intercepted Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloud-sector-full-history-jsons
          path: data/*_direct.json
