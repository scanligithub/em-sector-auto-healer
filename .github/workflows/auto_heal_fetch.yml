name: Sector Fetcher Nitro

on:
  workflow_dispatch:
    inputs:
      attempt:
        description: 'Current Execution Attempt (Internal use)'
        required: false
        default: '1'
      chain_run_ids:
        description: 'Comma separated historical run IDs (Internal use)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write

jobs:
  # 阶段 1：调度分发
  dispatcher:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      
      # 非首发轮，自动拉取上一接力棒的 pending_list 状态文件
      - name: Download Pending List
        if: ${{ github.event.inputs.attempt != '1' && github.event.inputs.attempt != '' }}
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: auto_heal_fetch.yml
          name: pending-list-artifact
          path: .
          
      - name: Generate Matrix
        id: set-matrix
        env:
          ATTEMPT_COUNT: ${{ github.event.inputs.attempt || '1' }}
        run: |
          python scripts/dispatcher.py
          echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT
          
      - name: Upload Chunks
        uses: actions/upload-artifact@v4
        with:
          name: chunks-artifact
          path: chunks/*.json
          retention-days: 1

  # 阶段 2：20 节点分布式抓取
  fetch-cluster:
    needs: dispatcher
    runs-on: ubuntu-latest
    if: needs.dispatcher.outputs.matrix != '[]'
    strategy:
      matrix:
        chunk_id: ${{ fromJson(needs.dispatcher.outputs.matrix) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'
      - run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps
          
      - name: Download Chunks
        uses: actions/download-artifact@v4  # 【已修正：将 upload 修复为 download】
        with:
          name: chunks-artifact
          path: chunks/
          
      - name: Execute Node Engine
        run: python core/muscle_engine.py ${{ matrix.chunk_id }}
        
      # 数据包加上当前的 github.run_id 防止多轮重试下载时在 Artifact 中发生命名覆盖冲突
      - name: Upload Success Data
        uses: actions/upload-artifact@v4
        with:
          name: success-data-${{ github.run_id }}-chunk-${{ matrix.chunk_id }}
          path: success_data_${{ matrix.chunk_id }}/*.json
          retention-days: 1
          
      - name: Upload Failed List
        uses: actions/upload-artifact@v4
        with:
          name: failed-list-chunk-${{ matrix.chunk_id }}
          path: failed_list_${{ matrix.chunk_id }}.json
          retention-days: 1

  # 阶段 3：裁判所（Aggregator）
  aggregator:
    needs: [dispatcher, fetch-cluster]
    if: always() && needs.dispatcher.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.judge.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Download Failed Lists
        uses: actions/download-artifact@v4
        with:
          pattern: failed-list-chunk-*
          merge-multiple: true
          path: .
          
      # 物理下载本轮所有成功的 JSON 数据，用来做“物理真实性去重”
      - name: Download Current Success Data
        uses: actions/download-artifact@v4
        with:
          pattern: success-data-${{ github.run_id }}-chunk-*
          merge-multiple: true
          path: success_data_merged/
          
      - name: Aggregate & Judge
        id: judge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_ATTEMPT: ${{ github.event.inputs.attempt || '1' }}
          CHAIN_IDS: ${{ github.event.inputs.chain_run_ids || '' }}
        run: |
          python scripts/aggregator.py > result.txt
          REMAINING=$(grep "COUNT=" result.txt | cut -d'=' -f2)
          echo "判定结束：当前依然残留未完成板块数: $REMAINING"
          
          NEW_CHAIN="${CHAIN_IDS},${{ github.run_id }}"
          NEW_CHAIN=$(echo $NEW_CHAIN | sed 's/^,//')
          
          # 最大允许接力 5 轮，5 轮之后不管剩余多少直接强行收尾
          if [ "$REMAINING" -gt "0" ] && [ "$CURRENT_ATTEMPT" -lt "5" ]; then
            echo "💥 存在未下载完的数据，触发第 $((CURRENT_ATTEMPT+1)) 轮接力!"
            echo "status=CONTINUE" >> $GITHUB_OUTPUT
            gh workflow run auto_heal_fetch.yml \
              -f attempt=$((CURRENT_ATTEMPT+1)) \
              -f chain_run_ids="$NEW_CHAIN"
          else
            echo "✅ 队列已全部抽干，或者已达到安全接力红线。向后续步骤下发 Release 指令！"
            echo "status=DONE" >> $GITHUB_OUTPUT
            echo "$NEW_CHAIN" > final_chain.txt
          fi
          
      - name: Upload Pending List
        uses: actions/upload-artifact@v4
        with:
          name: pending-list-artifact
          path: pending_list.json
          retention-days: 1
          
      - name: Upload Final Chain
        if: steps.judge.outputs.status == 'DONE'
        uses: actions/upload-artifact@v4
        with:
          name: final-chain-artifact
          path: final_chain.txt

  # 阶段 4：跨运行（Runs）数据合并打包发布
  releaser:
    needs: aggregator
    if: needs.aggregator.outputs.status == 'DONE'
    runs-on: ubuntu-latest
    steps:
      - name: Download Final Chain
        uses: actions/download-artifact@v4
        with:
          name: final-chain-artifact
          
      - name: Consolidated All Runs Data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir final_dataset
          CHAIN_IDS=$(cat final_chain.txt)
          IFS=',' read -ra ADDR <<< "$CHAIN_IDS"
          for id in "${ADDR[@]}"; do
            echo "⬇️ 正在跨节点回收 Run ID: $id 产生的全部 K线碎片..."
            gh run download $id --pattern "success-data-$id-chunk-*" --dir final_dataset || true
          done
          
          # 执行物理扁平化及同名覆盖去重
          find final_dataset -type f -name "*.json" -exec mv {} final_dataset/ \;
          find final_dataset -type d -empty -delete
          
          cd final_dataset
          zip -r ../Full_Sector_Klines.zip .
          
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE_TAG=$(date +'%Y%m%d_%H%M%S')
          gh release create "sector-data-${DATE_TAG}" Full_Sector_Klines.zip \
            --title "Sector Klines Database ($DATE_TAG)" \
            --notes "由自愈接力系统自动归档。本库已过滤无法访问的死信板块，保证数据 100% 完整与零损坏。"
