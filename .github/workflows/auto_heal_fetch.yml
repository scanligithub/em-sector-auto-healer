name: AI Auto-Healing Sector Fetcher V3

on:
  schedule:
    - cron: '30 8 * * *'  # 每天北京时间 16:30 运行 (收盘后)
  workflow_dispatch:      # 支持手动触发

permissions:
  contents: write

jobs:
  fetch-and-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          # 安装 Scrapling 依赖的底层浏览器内核
          python -m playwright install chromium --with-deps

      # 💡 核心步骤：持久化 DuckDB 数据库文件
      # 这样增量逻辑 (last_date + 1) 才能在明天的运行中生效
      - name: Restore Data Warehouse Cache
        uses: actions/cache@v4
        with:
          path: data/sector_quant.db
          key: sector-db-${{ github.run_id }}
          restore-keys: |
            sector-db-

      - name: Run Engine
        env:
          CONCURRENCY: 8  # 工业级稳健并发
          # 💡 请确保在 GitHub Repo -> Settings -> Secrets -> Actions 中配置了此变量
          # 格式示例: worker1.dev,worker2.dev
          CF_WORKER_URLS: ${{ secrets.CF_WORKER_URLS }}
          DATA_PATH: "data/sector_klines_full.parquet"
        run: python main.py

      # 导出结果供下载查看 (Parquet 适合分析，DB 适合存储)
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sector-data-package
          path: |
            data/sector_quant.db
            data/sector_klines_full.parquet

      # 如果有配置规则变动，自动提交代码仓（可选）
      - name: Auto-Commit Metadata
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain config/) ]]; then
            git add config/*.json
            git commit -m "🤖 AI Auto-Healed: Update Sector Metadata"
            git push
          fi
