name: Sector Fetcher Nitro

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  visual-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      # 新增：安装 xvfb 虚拟显示服务
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      # 核心：使用 xvfb-run 启动真实的 headed Chromium
      - name: Run Headed Chromium Verification
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" python main.py

      # 必须上传截图，我们要用眼睛看真相
      - name: Upload Proof Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: headless-proof-images
          path: data/*_headed_proof.png
