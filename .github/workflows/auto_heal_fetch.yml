name: AI Auto-Healing Sector Fetcher

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Engine
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL_NAME: ${{ secrets.LLM_MODEL_NAME }}
          CONCURRENCY: 10  # 💡 建议测试阶段降到 10，保护 Worker
          CF_WORKER_URL: "setor.scanliworkersdev.workers.dev" # 💡 补上你的 Worker 域名！
        run: python main.py

      - name: Auto-Commit If Rules Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain config/active_rules.json) ]]; then
            git add config/active_rules.json
            git commit -m "🤖 AI Auto-Healed: Update EM rules via Browser Navigation"
            git push
          fi

      - name: Upload Data
        uses: actions/upload-artifact@v4
        with:
          name: sector-data
          path: data/*.parquet
