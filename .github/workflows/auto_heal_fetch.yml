name: Sector Fetcher Nitro

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-api-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Async Fetcher
        run: |
          python main.py

      # 将生成的全量 K 线 JSON 压缩打包，便于直接在浏览器下载验证数据完整性
      - name: Upload Data Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sector-kline-json-data
          path: data/*_history.json
